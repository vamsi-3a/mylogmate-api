# ============================================================
# MyLogMate API — Render Blueprint (FREE single-service deploy)
# https://render.com/docs/blueprint-spec
#
# One free web service runs FastAPI + does embedding/email work
# in-process (CELERY_TASK_ALWAYS_EAGER=true). No separate worker
# = no paid plan needed.
#
# External free managed services (set their URLs as secrets below):
#   Postgres → Neon          Redis → Redis Cloud
#   Vectors  → Qdrant Cloud   LLM  → Groq
#
# ── Secrets to set in the Render dashboard (Environment tab) ──
#   DATABASE_URL    (Neon connection string)
#   REDIS_URL       (Redis Cloud — only used by /ready in eager mode)
#   QDRANT_URL      (Qdrant Cloud cluster URL)
#   QDRANT_API_KEY  (Qdrant Cloud API key)
#   ENCRYPTION_KEY  (Fernet key — BACK IT UP; it decrypts all logs)
#   GROQ_API_KEY    (Groq API key)
#   CORS_ORIGINS    (your Vercel URL, e.g. https://mylogmate.vercel.app)
#   FRONTEND_URL    (your Vercel URL)
#   GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET   (optional — Google login)
#   SMTP_USER / SMTP_PASSWORD                 (optional — reset emails)
#
# JWT_SECRET_KEY is auto-generated by Render on first deploy.
#
# NOTE: free web services sleep after ~15 min idle (cold start ~30-50s),
# and run migrations on each start via the command below (free tier has
# no preDeployCommand). To remove cold starts later, set plan: starter.
# ============================================================

services:
  - type: web
    name: mylogmate-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: oregon
    autoDeploy: true
    healthCheckPath: /health

    # Free tier has no preDeployCommand — run migrations at start, then serve.
    # --workers 1 keeps a single embedding-model instance in memory (512 MB cap).
    dockerCommand: >-
      sh -c "alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1"

    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: CELERY_TASK_ALWAYS_EAGER
        value: "true"            # run embedding/email tasks in-process
      - key: COOKIE_SAMESITE
        value: none              # cross-site cookie for Vercel ↔ Render
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: QDRANT_COLLECTION
        value: log_entries
      - key: LLM_PROVIDER
        value: groq
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: AI_QUERY_DAILY_LIMIT
        value: "50"
      - key: AUTH_RATE_LIMIT
        value: "5/minute"

      # Auto-generated random secret
      - key: JWT_SECRET_KEY
        generateValue: true

      # ── Secrets — set these in the Render dashboard ──────────
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: FRONTEND_URL
        sync: false
